<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomidas & KIRBACH Farm Asistanı v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>⚔️ GOMIDAS & KIRBACH</h1>
        <p>Mobile2 Profesyonel Farm Kontrol Merkezi v2.0</p>
    </header>

    <main class="container">
        <section class="controls-card">
            <div class="control-group">
                <label for="map-select">🗺️ Harita Seç:</label>
                <select id="map-select">
                    <option value="sohan">Sohan Dağı (45 Dk)</option>
                    <option value="doyum">Doyumwhan (60 Dk)</option>
                </select>
            </div>

            <div class="control-group toggles">
                <label class="switch-container">
                    <input type="checkbox" id="audio-toggle" checked>
                    <span class="switch-label">🗣️ Sesli Uyarı (Konuşma)</span>
                </label>
                <div id="wakelock-status" class="status-badge status-off">🔒 Wake Lock: Pasif</div>
            </div>
        </section>

        <section class="dashboard-card">
            <h2>📊 Genel Durum Paneli</h2>
            <div id="general-dashboard" class="dashboard-grid">
                </div>
        </section>

        <section id="channels-container" class="channels-grid">
            </section>
    </main>

    <footer class="footer-banner">
        <p>💡 Öneri sistemleriniz için: <span>Gomidas</span> Veya <span>KIRBACH</span> PM atınız.</p>
    </footer>

    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
